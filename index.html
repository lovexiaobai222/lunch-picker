<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>午餐大转盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.9);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }

      .wheel-wrapper {
        position: relative;
        display: inline-block;
      }

      #wheel {
        transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      }

      .pointer {
        position: absolute;
        top: -18px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 16px solid transparent;
        border-right: 16px solid transparent;
        border-top: 30px solid #ef4444;
        filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        z-index: 10;
      }

      .spin-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f59e0b, #ef4444);
        color: white;
        font-weight: bold;
        font-size: 16px;
        border: 4px solid white;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        z-index: 10;
        transition: transform 0.2s;
      }
      .spin-btn:hover {
        transform: translate(-50%, -50%) scale(1.1);
      }
      .spin-btn:active {
        transform: translate(-50%, -50%) scale(0.95);
      }
      .spin-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: translate(-50%, -50%);
      }

      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #1f2937;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 100;
      }
      .toast.show {
        opacity: 1;
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-orange-50 to-amber-100">
    <div class="max-w-md mx-auto px-4 py-8">
      <h1 class="text-3xl font-bold text-center text-orange-600 mb-2">
        🍜 午餐大转盘
      </h1>
      <p class="text-center text-gray-500 mb-6">今天吃什么？转一转就知道！</p>

      <!-- 转盘区域 -->
      <div class="flex justify-center mb-8">
        <div class="wheel-wrapper">
          <div class="pointer"></div>
          <canvas id="wheel" width="320" height="320"></canvas>
          <button class="spin-btn" id="spinBtn" onclick="spin()">GO!</button>
        </div>
      </div>

      <!-- 结果展示 -->
      <div
        id="result"
        class="hidden mb-6 bg-white rounded-2xl shadow-lg p-6 text-center fade-in"
      >
        <p class="text-gray-500 text-sm mb-1">今天就吃</p>
        <p id="resultText" class="text-2xl font-bold text-orange-600"></p>
      </div>

      <!-- 选项管理 -->
      <div class="bg-white rounded-2xl shadow-lg p-5">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-semibold text-gray-700">选项管理</h2>
          <button
            onclick="refreshOptions()"
            id="refreshBtn"
            class="text-sm text-orange-500 hover:text-orange-600 transition-colors"
            title="从云端刷新最新数据"
          >
            刷新
          </button>
        </div>

        <div class="flex gap-2 mb-4">
          <input
            type="text"
            id="newOption"
            placeholder="输入新选项..."
            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent text-sm"
            onkeydown="if (event.key === 'Enter') addOption();"
          />
          <button
            onclick="addOption()"
            class="px-5 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 active:bg-orange-700 transition-colors text-sm font-medium whitespace-nowrap"
          >
            添加
          </button>
        </div>

        <div id="optionList" class="space-y-2"></div>
      </div>
    </div>

    <script>
      const JSONBIN_ID = "69feac59adc21f119a744206";
      const JSONBIN_KEY = "$2a$10$0J7j8Te8JkTwmPBc8VuVJOTJjT7CGupooiaabT3ErcTNuP5.h.n2a";
      const JSONBIN_API = `https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;

      const COLORS = [
        "#f97316",
        "#eab308",
        "#22c55e",
        "#3b82f6",
        "#8b5cf6",
        "#ec4899",
        "#14b8a6",
        "#f43f5e",
        "#6366f1",
        "#84cc16",
      ];

      let options = [];
      let spinning = false;
      let currentRotation = 0;
      let saving = false;

      async function loadOptions() {
        try {
          const res = await fetch(`${JSONBIN_API}/latest`, {
            headers: { "X-Access-Key": JSONBIN_KEY },
          });
          const data = await res.json();
          options = data.record?.options || [];
        } catch {
          const saved = localStorage.getItem("lunch-options");
          if (saved) {
            options = JSON.parse(saved);
          } else {
            options = [
              "老花溪牛肉粉",
              "隆江猪脚饭",
              "牛关关",
              "炒菜",
              "黄妈面馆",
              "土家洋芋饭",
            ];
          }
        }
        localStorage.setItem("lunch-options", JSON.stringify(options));
        renderAll();
      }

      async function saveOptions() {
        localStorage.setItem("lunch-options", JSON.stringify(options));
        if (saving) return;
        saving = true;
        try {
          await fetch(JSONBIN_API, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "X-Access-Key": JSONBIN_KEY,
            },
            body: JSON.stringify({ options }),
          });
        } catch {
          showToast("同步失败，仅保存到本地");
        } finally {
          saving = false;
        }
      }

      function exportJSON() {
        return JSON.stringify({ options }, null, 2);
      }

      function renderAll() {
        drawWheel();
        renderOptionList();
      }

      function drawWheel() {
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const r = cx - 10;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (options.length === 0) {
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fillStyle = "#e5e7eb";
          ctx.fill();
          ctx.fillStyle = "#9ca3af";
          ctx.font = "16px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("请添加选项", cx, cy);
          return;
        }

        const sliceAngle = (Math.PI * 2) / options.length;

        options.forEach((opt, i) => {
          const startAngle = i * sliceAngle;
          const endAngle = startAngle + sliceAngle;

          // 扇形
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, startAngle, endAngle);
          ctx.closePath();
          ctx.fillStyle = COLORS[i % COLORS.length];
          ctx.fill();

          // 边线
          ctx.strokeStyle = "rgba(255,255,255,0.5)";
          ctx.lineWidth = 2;
          ctx.stroke();

          // 文字
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(startAngle + sliceAngle / 2);
          ctx.fillStyle = "white";
          ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";

          const text = opt.length > 6 ? opt.slice(0, 6) + "…" : opt;
          ctx.fillText(text, r * 0.6, 0);
          ctx.restore();
        });

        // 外圈装饰
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 4;
        ctx.stroke();

        // 中心圆
        ctx.beginPath();
        ctx.arc(cx, cy, 30, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
      }

      function spin() {
        if (spinning || options.length === 0) return;
        spinning = true;

        const btn = document.getElementById("spinBtn");
        btn.disabled = true;
        document.getElementById("result").classList.add("hidden");

        const extraTurns = 5 + Math.floor(Math.random() * 5);
        const randomAngle = Math.random() * 360;
        const totalRotation = extraTurns * 360 + randomAngle;
        currentRotation += totalRotation;

        const canvas = document.getElementById("wheel");
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
          const finalAngle = currentRotation % 360;
          // 指针在顶部(270度位置, canvas 0度在右边)
          const pointerAngle = (360 - finalAngle + 270) % 360;
          const sliceAngle = 360 / options.length;
          const index = Math.floor(pointerAngle / sliceAngle) % options.length;

          const resultEl = document.getElementById("result");
          document.getElementById("resultText").textContent = options[index];
          resultEl.classList.remove("hidden");
          resultEl.classList.remove("fade-in");
          void resultEl.offsetWidth;
          resultEl.classList.add("fade-in");

          spinning = false;
          btn.disabled = false;
        }, 4200);
      }

      function addOption() {
        const input = document.getElementById("newOption");
        const val = input.value.trim();
        if (!val) return;
        if (options.includes(val)) {
          input.value = "";
          return;
        }
        options.push(val);
        input.value = "";
        saveOptions();
        renderAll();
      }

      function removeOption(index) {
        options.splice(index, 1);
        saveOptions();
        renderAll();
      }

      function renderOptionList() {
        const container = document.getElementById("optionList");
        if (options.length === 0) {
          container.innerHTML =
            '<p class="text-gray-400 text-sm text-center py-2">暂无选项，请添加</p>';
          return;
        }
        container.innerHTML = options
          .map(
            (opt, i) =>
              `<div class="flex items-center justify-between px-3 py-2 bg-gray-50 rounded-lg group">
          <span class="text-sm text-gray-700 flex items-center gap-2">
            <span class="w-3 h-3 rounded-full inline-block" style="background:${COLORS[i % COLORS.length]}"></span>
            ${escapeHtml(opt)}
          </span>
          <button
            onclick="removeOption(${i})"
            class="text-gray-400 hover:text-red-500 transition-colors text-lg leading-none px-1"
            title="删除"
          >&times;</button>
        </div>`,
          )
          .join("");
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      function showToast(msg) {
        let toast = document.getElementById("toast");
        if (!toast) {
          toast = document.createElement("div");
          toast.id = "toast";
          toast.className = "toast";
          document.body.appendChild(toast);
        }
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      async function refreshOptions() {
        const btn = document.getElementById("refreshBtn");
        btn.textContent = "刷新中...";
        btn.disabled = true;
        try {
          const res = await fetch(`${JSONBIN_API}/latest`, {
            headers: { "X-Access-Key": JSONBIN_KEY },
          });
          const data = await res.json();
          options = data.record?.options || [];
          localStorage.setItem("lunch-options", JSON.stringify(options));
          renderAll();
          showToast("已同步最新数据");
        } catch {
          showToast("刷新失败，请检查网络");
        } finally {
          btn.textContent = "刷新";
          btn.disabled = false;
        }
      }

      loadOptions();
    </script>
  </body>
</html>
